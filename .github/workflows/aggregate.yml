name: BOSS Aggregation

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  aggregate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Run Delta-Based Aggregation Engine
      - name: Run aggregation engine
        run: python scripts/count_engine.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Commit updated boss-state.json if changed
      - name: Commit updated state
        run: |
          git config user.name "boss-bot"
          git config user.email "boss-bot@users.noreply.github.com"
          git add boss-state.json
          git commit -m "chore: update boss state" || echo "No changes to commit"
          git push