name: BOSS Aggregation

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  aggregate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Run Tier Count Engine
      - name: Run aggregation
        run: python scripts/count_engine.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Ensure manifest file exists (temporary placeholder if needed)
      - name: Create manifest file
        run: |
          if [ ! -f boss-manifest.json ]; then
            echo "{}" > boss-manifest.json
          fi

      # Upload artifact
      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: boss-manifest
          path: boss-manifest.json